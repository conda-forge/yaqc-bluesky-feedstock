{% set name = "yaqc-bluesky" %}
{% set version = "2023.8.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ccece1fd67efb25e483371a9afd5448664f76952e82ef0449b47b0c73c17cd20

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - flit
    - bluesky >=1.6.6
    - happi >=1.9.0
    - yaqc >=2021.10.0
    - python {{ python_min }}
  run:
    - bluesky >=1.6.6
    - happi >=1.9.0
    - yaqc >=2021.10.0
    - python >={{ python_min }}
  run_constrained:
    - databroker >=1.2.2

test:
  imports:
    - yaqc_bluesky
  #commands:
  #  - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bluesky/yaqc-bluesky
  summary: A bluesky interface to the yaq instrument control framework.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
    - ksunden
